services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-genreader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genreader}
      POSTGRES_DB: ${POSTGRES_DB:-genreader}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genreader"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://genreader:genreader@postgres:5432/genreader
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
      minio: { condition: service_started }

  worker:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://genreader:genreader@postgres:5432/genreader
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: minio:9000
    depends_on:
      - backend
    command: ["arq", "app.workers.arq_worker.WorkerSettings"]
    deploy:
      replicas: 2

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost}
      NEXT_PUBLIC_WS_BASE_URL: ${PUBLIC_WS_URL:-ws://localhost}

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pg_data: {}
  redis_data: {}
  minio_data: {}
